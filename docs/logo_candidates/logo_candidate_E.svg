      <stop offset="0" stop-color="#0B1F2D"/>
      <stop offset="1" stop-color="#061522"/>
    </linearGradient>
    <linearGradient id="e-red" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#A91520"/>
      <stop offset="1" stop-color="#FF2F3A"/>
    </linearGradient>
    <linearGradient id="e-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18A8FF"/>
      <stop offset="1" stop-color="#00D6C8"/>
    </linearGradient>
    <filter id="e-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <g id="e-icon">
      <rect x="20" y="24" width="120" height="112" rx="22" fill="#071724" stroke="#1F4E68" stroke-width="2.5" filter="url(#e-shadow)"/>
      <path d="M36 106 C49 83 64 94 76 76 C91 52 108 58 124 37" fill="none" stroke="#FF2F3A" stroke-width="8" stroke-linecap="round"/>
      <path d="M111 36 H129 V54" fill="none" stroke="#FF2F3A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M36 93 C53 116 77 113 96 101 C111 91 121 94 132 104" fill="none" stroke="url(#e-blue)" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
      <path d="M38 122 H125" stroke="#1F4E68" stroke-width="2"/>
      <rect x="43" y="51" width="73" height="39" rx="8" fill="#061522" stroke="#FF4650" stroke-width="2"/>
      <text x="80" y="80" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="#EAF6FF">ETF</text>
      <circle cx="37" cy="106" r="5" fill="#00D6C8"/>
      <circle cx="124" cy="37" r="5" fill="#FF2F3A"/>
