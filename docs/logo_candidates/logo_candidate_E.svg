  <use href="#e-icon" transform="translate(784 28) scale(0.72)"/>
  <text x="864" y="185" text-anchor="middle" font-family="Microsoft YaHei UI, Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="14" fill="#7FA6BE">单独图标预览</text>
