<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-label="方案C 量化矩阵型 ETF Logo">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F2D"/>
      <stop offset="1" stop-color="#061522"/>
    </linearGradient>
    <linearGradient id="c-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E334B"/>
      <stop offset="1" stop-color="#071724"/>
    </linearGradient>
    <filter id="c-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <g id="c-icon">
      <rect x="20" y="18" width="120" height="124" rx="18" fill="url(#c-panel)" stroke="#1F4E68" stroke-width="2.5" filter="url(#c-shadow)"/>
      <g opacity="0.75">
        <path d="M40 42 H120 M40 66 H120 M40 90 H120 M40 114 H120" stroke="#1F4E68" stroke-width="1.4"/>
        <path d="M52 32 V130 M80 32 V130 M108 32 V130" stroke="#1F4E68" stroke-width="1.4"/>
      </g>
      <rect x="44" y="96" width="10" height="22" rx="2" fill="#FF2F3A"/>
      <rect x="72" y="76" width="10" height="42" rx="2" fill="#00D6C8"/>
      <rect x="100" y="58" width="10" height="60" rx="2" fill="#18A8FF"/>
      <path d="M38 112 L58 92 L76 99 L100 61 L123 72" fill="none" stroke="#FF2F3A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="39" y="42" width="82" height="36" rx="8" fill="#061522" stroke="#FF4650" stroke-width="2"/>
      <text x="80" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="900" fill="#EAF6FF" letter-spacing="1">ETF</text>
      <circle cx="122" cy="39" r="6" fill="#00D6C8"/>
      <circle cx="33" cy="125" r="5" fill="#FF2F3A"/>
    </g>
  </defs>
  <rect width="960" height="240" rx="18" fill="#061522"/>
  <rect x="12" y="12" width="936" height="216" rx="16" fill="url(#c-bg)" stroke="#16384D"/>
  <use href="#c-icon" transform="translate(34 40)"/>
  <text x="220" y="78" font-family="Microsoft YaHei UI, Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#EAF6FF">跨境ETF智能投资决策系统</text>
  <text x="720" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="900" fill="#FF2F3A">V8</text>
  <text x="222" y="116" font-family="Microsoft YaHei UI, Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="18" fill="#9FB7C8">智能决策 · 精准量化 · 风险守护</text>
  <path d="M222 146 H604" stroke="#1F4E68" stroke-width="1"/>
  <text x="222" y="176" font-family="Microsoft YaHei UI, Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="16" fill="#00D6C8">量化矩阵型 · 数据网格 · K线信号 · 决策终端</text>
  <rect x="806" y="38" width="116" height="116" rx="18" fill="#061927" stroke="#1F4E68"/>
  <use href="#c-icon" transform="translate(784 28) scale(0.72)"/>
  <text x="864" y="185" text-anchor="middle" font-family="Microsoft YaHei UI, Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="14" fill="#7FA6BE">单独图标预览</text>
